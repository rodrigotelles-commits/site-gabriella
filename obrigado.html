  <style>
    :root {
      --bg: #f8f3fb;
      --paper: #fffaf7;
      --lilac: #8f7aa8;
      --lilac-dark: #6f5a87;
      --lilac-deep: #4f3f63;
      --text: #302a27;
      --muted: #736a76;
      --line: rgba(111,90,135,.18);
      --shadow: 0 26px 80px rgba(79,63,99,.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(ellipse 70% 60% at 50% 0%, #e8dcf2 0%, transparent 70%);
    }

    .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: clamp(40px, 7vw, 72px) clamp(32px, 7vw, 80px);
      box-shadow: var(--shadow);
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 10px 28px rgba(37,211,102,.30);
      animation: pop .5s cubic-bezier(.34,1.56,.64,1) both;
    }

    .icon-wrap svg {
      width: 38px;
      height: 38px;
      fill: white;
    }

    .brand {
      margin-bottom: 28px;
    }

    .brand strong {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--lilac-deep);
      letter-spacing: .01em;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: var(--lilac-dark);
      font-size: .65rem;
      letter-spacing: .16em;
      text-transform: uppercase;
      font-weight: 800;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.9rem, 4vw, 2.7rem);
      font-weight: 700;
      color: var(--lilac-deep);
      line-height: 1.1;
      letter-spacing: -.02em;
      margin-bottom: 16px;
    }

    p {
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.65;
      margin-bottom: 32px;
    }

    /* Spinner / progress bar */
    .progress-wrap {
      width: 100%;
      height: 4px;
      background: rgba(111,90,135,.12);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--lilac) 0%, #25d366 100%);
      border-radius: 999px;
      animation: fill 2s linear forwards;
    }

    .redirect-msg {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .btn-whats {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #16a34a;
      color: white;
      border-radius: 8px;
      padding: 16px 32px;
      font-size: 1rem;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 28px rgba(22,163,74,.28);
      transition: .22s ease;
    }

    .btn-whats:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 36px rgba(22,163,74,.38);
    }

    .btn-whats svg {
      width: 22px;
      height: 22px;
      fill: white;
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    @keyframes fill {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</head>
